name: Actualizar Token GEN

on:
  schedule:
    - cron: '0 */2 * * *'  # Se ejecuta automáticamente cada 2 horas
  workflow_dispatch:      # Botón para activarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script extractor
      run: python actualizargen.py  # <-- Corregido aquí para que use tu nombre exacto

    - name: Subir cambios al repositorio de GitHub
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add listaespanhol.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Token de GEN actualizado automáticamente" && git push)
